<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ft_vox</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: monospace;
      }
      #gpu-canvas {
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #baffc9;
        text-shadow: 0 0 4px #000, 0 0 2px #000;
        font-size: 14px;
        line-height: 1.4;
        pointer-events: none;
        white-space: pre;
        user-select: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border: 1px solid #fff;
        border-radius: 50%;
        mix-blend-mode: difference;
        pointer-events: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        font-size: 20px;
        cursor: pointer;
        text-align: center;
        padding: 1em;
      }
      #overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>
    <div id="crosshair"></div>
    <div id="hud"></div>
    <div id="overlay">
      Click to play (fullscreen) — WASD move, mouse look, left-click breaks blocks, Shift = x20 speed, Esc to release
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
